apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-service
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: backend
spec:
  replicas: {{ .Values.transactionService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: transaction-service
      {{- include "techbleat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: transaction-service
        tier: backend
        {{- include "techbleat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "techbleat.serviceAccountName" . }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting for postgres; sleep 5; done
              until nc -z redis 6379; do echo waiting for redis; sleep 5; done
              until nc -z kafka 29092; do echo waiting for kafka; sleep 5; done
      containers:
        - name: transaction-service
          image: {{ .Values.images.transactionService | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-service-secret
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: transaction-service-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: transaction-service-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: REDIS_PORT
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: SERVER_PORT
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: transaction-service-config
                  key: FRONTEND_ORIGIN
            {{- if .Values.tracing.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.tracing.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.tracing.otlpProtocol | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: none
            - name: OTEL_LOGS_EXPORTER
              value: none
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.transactionService.resources | nindent 12 }}
