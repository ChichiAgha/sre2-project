apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: backend
spec:
  replicas: {{ .Values.userService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: user-service
      {{- include "techbleat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: user-service
        tier: backend
        {{- include "techbleat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "techbleat.serviceAccountName" . }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 5; done"]
      containers:
        - name: user-service
          image: {{ .Values.images.userService | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DATABASE_URL
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: FRONTEND_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.userService.resources | nindent 12 }}
