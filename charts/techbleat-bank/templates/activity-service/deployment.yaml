apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-service
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: backend
spec:
  replicas: {{ .Values.activityService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: activity-service
      {{- include "techbleat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: activity-service
        tier: backend
        {{- include "techbleat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "techbleat.serviceAccountName" . }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do echo waiting for postgres; sleep 5; done
              until nc -z kafka 29092; do echo waiting for kafka; sleep 5; done
      containers:
        - name: activity-service
          image: {{ .Values.images.activityService | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: activity-service-secret
                  key: DATABASE_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: activity-service-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: activity-service-config
                  key: FRONTEND_ORIGIN
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            {{- toYaml .Values.activityService.resources | nindent 12 }}
