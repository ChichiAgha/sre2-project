{{- if and .Values.monitoring.enabled .Values.monitoring.exporters.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: monitoring
    app.kubernetes.io/component: redis-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis-exporter
      {{- include "techbleat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis-exporter
        tier: monitoring
        {{- include "techbleat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "techbleat.serviceAccountName" . }}
      containers:
        - name: redis-exporter
          image: {{ .Values.images.redisExporter | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: REDIS_ADDR
              value: redis://redis:{{ .Values.redis.service.port }}
          ports:
            - name: metrics
              containerPort: {{ .Values.monitoring.exporters.redis.port }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: monitoring
    app.kubernetes.io/component: redis-exporter
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.monitoring.exporters.redis.port }}
      targetPort: metrics
  selector:
    app.kubernetes.io/component: redis-exporter
    {{- include "techbleat.selectorLabels" . | nindent 4 }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    release: {{ .Values.monitoring.prometheusReleaseLabel | quote }}
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "techbleat.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis-exporter
  namespaceSelector:
    matchNames:
      - {{ include "techbleat.namespace" . }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
{{- end }}
