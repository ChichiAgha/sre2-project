apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: messaging
spec:
  type: ClusterIP
  ports:
    - name: internal
      port: {{ .Values.kafka.service.internalPort }}
      targetPort: internal
    - name: external
      port: {{ .Values.kafka.service.externalPort }}
      targetPort: external
    - name: controller
      port: {{ .Values.kafka.service.controllerPort }}
      targetPort: controller
  selector:
    app.kubernetes.io/component: kafka
    {{- include "techbleat.selectorLabels" . | nindent 4 }}
