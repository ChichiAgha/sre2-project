apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: kafka
      {{- include "techbleat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kafka
        tier: messaging
        {{- include "techbleat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "techbleat.serviceAccountName" . }}
      enableServiceLinks: false
      containers:
        - name: kafka
          image: {{ .Values.images.kafka | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: internal
              containerPort: 29092
            - name: external
              containerPort: 9092
            - name: controller
              containerPort: 29093
          envFrom:
            - configMapRef:
                name: kafka-config
          readinessProbe:
            tcpSocket:
              port: internal
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: internal
            initialDelaySeconds: 120
            periodSeconds: 20
          resources:
            {{- toYaml .Values.kafka.resources | nindent 12 }}
