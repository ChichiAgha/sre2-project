{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: techbleat-bank-custom-rules
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    release: {{ .Values.monitoring.prometheusReleaseLabel | quote }}
    {{- include "techbleat.labels" . | nindent 4 }}
spec:
  groups:
    - name: techbleat-bank.business
      rules:
        - record: techbleat:transaction_rate_per_second
          expr: sum by (type) (rate(banking_transactions_total{namespace="{{ include "techbleat.namespace" . }}"}[5m]))

    - name: techbleat-bank.http
      rules:
        - record: techbleat:http_5xx_rate_per_second
          expr: |
            sum by (service) (
              rate(http_server_requests_seconds_count{namespace="{{ include "techbleat.namespace" . }}",status=~"5.."}[5m])
            )
            or
            sum by (service) (
              rate(http_requests_total{namespace="{{ include "techbleat.namespace" . }}",status=~"5.."}[5m])
            )
        - record: techbleat:http_request_latency_p95_seconds
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, service) (
                rate(http_server_requests_seconds_bucket{namespace="{{ include "techbleat.namespace" . }}"}[5m])
              )
            )
            or
            histogram_quantile(
              0.95,
              sum by (le, service) (
                rate(http_request_duration_seconds_bucket{namespace="{{ include "techbleat.namespace" . }}"}[5m])
              )
            )
        - record: techbleat:http_request_latency_p99_seconds
          expr: |
            histogram_quantile(
              0.99,
              sum by (le, service) (
                rate(http_server_requests_seconds_bucket{namespace="{{ include "techbleat.namespace" . }}"}[5m])
              )
            )
            or
            histogram_quantile(
              0.99,
              sum by (le, service) (
                rate(http_request_duration_seconds_bucket{namespace="{{ include "techbleat.namespace" . }}"}[5m])
              )
            )

    - name: techbleat-bank.infrastructure
      rules:
        - record: techbleat:kafka_consumer_lag
          expr: sum by (consumergroup, topic) (kafka_consumergroup_lag{namespace="{{ include "techbleat.namespace" . }}",topic="banking-transactions"})
        - record: techbleat:redis_cache_hit_rate
          expr: |
            (sum(rate(redis_keyspace_hits_total{namespace="{{ include "techbleat.namespace" . }}"}[5m])) or vector(0))
            /
            clamp_min(
              (sum(rate(redis_keyspace_hits_total{namespace="{{ include "techbleat.namespace" . }}"}[5m])) or vector(0))
              +
              (sum(rate(redis_keyspace_misses_total{namespace="{{ include "techbleat.namespace" . }}"}[5m])) or vector(0)),
              1
            )
        - record: techbleat:postgres_active_connections
          expr: sum(pg_stat_database_numbackends{namespace="{{ include "techbleat.namespace" . }}",datname="{{ .Values.postgres.database }}"})
        - record: techbleat:postgres_max_query_duration_seconds
          expr: max(pg_stat_activity_max_tx_duration{namespace="{{ include "techbleat.namespace" . }}"})
{{- end }}
