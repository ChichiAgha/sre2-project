apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ include "techbleat.namespace" . }}
  labels:
    {{- include "techbleat.labels" . | nindent 4 }}
    tier: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: frontend
    {{- include "techbleat.selectorLabels" . | nindent 4 }}
